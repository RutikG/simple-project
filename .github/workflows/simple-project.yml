name: simple-project-ci
on: [push]

jobs:
  simple-projrect-job:
    runs-on: ubuntu-latest
    steps:
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Download repository
        uses: actions/checkout@v4
        with:
          path: DOCKER

      - name: Build  only
        working-directory: DOCKER
        run: |
         ls
         docker build -t ${{ secrets.DOCKER_USERNAME }}/forfun:simple-project-v2 --platform=linux/amd64 .
       
      - name: Push to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/forfun:simple-project-v2 
           
          